[project]
name = "te_analysis"
description = "Quantifies translation efficiency (TE) across human, mouse, arabidopsis and yeast using CenikLab's CLR/ILR compositional regression on Ribo-seq + RNA-seq data, enabling cross-species analysis of conserved translational regulation."
version = "0.1.0"
channels = ['conda-forge']
platforms = ['linux-64', 'osx-64', 'osx-arm64', 'win-64']

[dependencies]
python = "~=3.12.0"
loguru = "*"
ruff = "*"
tqdm = "*"
typer = "*"
pip = "*"

[pypi-dependencies]
python-dotenv = "*"
te_analysis = { path = ".", editable = true }
