# Phase-1.5 placeholder schema for study-level manifests.
# Responsibility: lock the future manifest direction without adding validation logic.
# Non-responsibility in phase 1.5: no full schema enforcement, no materialization behavior, and no runtime defaults are implemented here.

schema_name: study_manifest_placeholder
phase: "1.5"

# A future study manifest must eventually declare at least:
required_direction:
  study_id: "<string>"
  organism: "<string>"
  pairing_ref: "<path-or-identifier>"
  fastq:
    # Canonical local staging root for production consumption.
    root: /home/xrx/my_project/te_analysis/data/raw/fastq
    # Future manifests may declare explicit local FASTQ paths or resolvable roots under the canonical root.
    paths: []
  download_policy:
    # Production direction is locked to downloader-disabled by default.
    enabled: false
  upstream_execution:
    profile: "<placeholder>"
  winsorization:
    policy: "<placeholder>"
  downstream_te_run:
    profile: "<placeholder>"
