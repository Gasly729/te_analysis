raw_fastq         = "data/raw/fastq"
metadata_csv      = "data/raw/metadata.csv"
external          = "data/external"
interim           = "data/interim"
interim_ribo      = "data/interim/ribo"
processed         = "data/processed"
processed_te      = "data/processed/te"

[vendor]
snakescale        = "vendor/snakescale"
te_model          = "vendor/TE_model"

[references]
root              = "references"
